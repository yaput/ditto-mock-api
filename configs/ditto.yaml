server:
  host: "0.0.0.0"
  port: 8080

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.7
  max_tokens: 4096
  timeout: 120s
  max_retries: 3

cache:
  enabled: true
  db_path: ".ditto/cache.db"
  ttl: 24h

scanner:
  registry_path: ".ditto/registry.json"
  scan_on_startup: true
  go_frameworks:
    - chi
    - gin
    - echo
    - gorilla
    - stdlib

logging:
  level: "info"
  format: "text"

dependencies:
  - name: user-service
    prefix: /api/users
    repo_path: ../user-service
  # - name: order-service
  #   prefix: /api/orders
  #   repo_path: ../order-service
  #   scan_paths:
  #     - .
